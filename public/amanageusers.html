<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CampusCare – Manage Users | Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
  /* ============================================================
     ADVANCED GLOBAL STYLES (Admin Manage Users)
     ============================================================ */
  :root {
    --navy: #0a1424;
    --navy-light: #111e2f;
    --amber: #f5a623;
    --amber-dim: #d48d1a;
    --cream: #f8f3e9;
    --text-main: #edf2f9;
    --text-muted: #8da1b5;
    --border: rgba(255,255,255,0.08);
    --card-bg: rgba(18, 30, 46, 0.65);
    --radius-xl: 24px;
    --radius-lg: 18px;
    --radius-md: 14px;
    --shadow-lg: 0 20px 35px -12px rgba(0,0,0,0.4);
    --glow-amber: rgba(245,166,35,0.2);
    --transition-smooth: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'DM Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: radial-gradient(circle at 10% 20%, #0f1a2b, #050a12);
    color: var(--text-main);
    line-height: 1.5;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    background: rgba(10, 20, 36, 0.85);
    backdrop-filter: blur(16px);
    padding: 0.9rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', 'DM Sans', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo i {
    color: var(--amber);
    font-size: 1.6rem;
    filter: drop-shadow(0 0 5px rgba(245,166,35,0.4));
  }
  .logo span {
    background: linear-gradient(135deg, #fff, var(--amber));
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }

  .main-menu {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .main-menu a {
    text-decoration: none;
    color: var(--text-muted);
    font-weight: 500;
    padding: 0.5rem 1.2rem;
    border-radius: 40px;
    transition: var(--transition-smooth);
    font-size: 0.9rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .main-menu a:hover, .main-menu a.active {
    color: var(--cream);
    background: rgba(245,166,35,0.12);
    transform: translateY(-1px);
  }

  /* Hero */
  .page-hero {
    text-align: center;
    padding: 2rem 1.5rem 0.5rem;
    max-width: 800px;
    margin: 0 auto;
  }
  .page-hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 2.8rem);
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff, var(--amber));
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 0.5rem;
  }
  .page-hero p {
    color: var(--text-muted);
    font-size: 1rem;
  }

  /* Stats row */
  .stats-row {
    max-width: 1300px;
    margin: 2rem auto 0;
    padding: 0 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1.5rem;
  }
  .stat-card {
    background: var(--card-bg);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.2rem;
    text-align: center;
    transition: var(--transition-smooth);
  }
  .stat-card:hover {
    border-color: var(--amber);
    transform: translateY(-3px);
  }
  .stat-card .stat-number {
    font-size: 2rem;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
    color: var(--amber);
  }
  .stat-card .stat-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }

  /* Search & Add Bar */
  .action-bar {
    max-width: 1300px;
    margin: 2rem auto 0;
    padding: 0 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: space-between;
    align-items: center;
  }
  .search-input {
    flex: 2;
    min-width: 250px;
    display: flex;
    align-items: center;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 60px;
    padding: 0.5rem 1rem;
    gap: 10px;
  }
  .search-input i {
    color: var(--text-muted);
  }
  .search-input input {
    background: transparent;
    border: none;
    color: var(--text-main);
    width: 100%;
    outline: none;
    font-size: 0.9rem;
  }
  .add-user-btn {
    background: linear-gradient(95deg, var(--amber), #e6a017);
    color: #0a1424;
    border: none;
    border-radius: 60px;
    padding: 0.6rem 1.5rem;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .add-user-btn:hover {
    background: var(--amber-dim);
    transform: translateY(-2px);
  }

  /* Table Container */
  .table-container {
    max-width: 1300px;
    margin: 2rem auto;
    padding: 0 2rem;
    overflow-x: auto;
  }
  .users-table {
    width: 100%;
    background: var(--card-bg);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    border-collapse: collapse;
    overflow: hidden;
  }
  .users-table th,
  .users-table td {
    padding: 1rem 1rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .users-table th {
    background: rgba(0,0,0,0.3);
    font-weight: 600;
    color: var(--amber);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .users-table tr:hover {
    background: rgba(245,166,35,0.05);
  }
  .role-badge {
    display: inline-block;
    padding: 0.2rem 0.8rem;
    border-radius: 40px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .role-admin {
    background: rgba(245,166,35,0.2);
    color: var(--amber);
  }
  .role-user {
    background: rgba(64, 158, 255, 0.2);
    color: #6ea8fe;
  }
  .action-buttons {
    display: flex;
    gap: 8px;
  }
  .action-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 0.3rem 0.6rem;
    border-radius: 30px;
    transition: 0.2s;
    font-size: 0.9rem;
  }
  .action-btn.edit:hover {
    color: var(--amber);
    background: rgba(245,166,35,0.2);
  }
  .action-btn.delete:hover {
    color: #ff6b6b;
    background: rgba(255,107,107,0.2);
  }
  .no-data {
    text-align: center;
    padding: 2rem;
    color: var(--text-muted);
  }

  /* Modal Styles */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 2000;
    align-items: center;
    justify-content: center;
  }
  .modal-content {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    max-width: 500px;
    width: 90%;
    padding: 2rem;
    animation: modalFade 0.3s;
  }
  @keyframes modalFade {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .modal-content h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-content input, .modal-content select {
    width: 100%;
    padding: 0.8rem;
    margin: 0.8rem 0;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.5);
    color: var(--text-main);
    font-family: inherit;
  }
  .modal-buttons {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
  }
  .modal-buttons button {
    flex: 1;
    padding: 0.7rem;
    border-radius: 40px;
    border: none;
    cursor: pointer;
    font-weight: 600;
  }
  .save-btn {
    background: var(--amber);
    color: #0a1424;
  }
  .cancel-btn {
    background: rgba(255,255,255,0.1);
    color: var(--text-main);
  }

  footer {
    background: #07101e;
    margin-top: 2rem;
    padding: 2rem;
    text-align: center;
    border-top: 1px solid var(--border);
  }
  footer p {
    color: var(--text-muted);
    font-size: 0.8rem;
  }

  @media (max-width: 780px) {
    header { padding: 0.8rem 1.5rem; flex-direction: column; text-align: center; }
    .main-menu { justify-content: center; }
    .stats-row, .action-bar, .table-container { padding: 0 1.2rem; }
    .users-table th, .users-table td { padding: 0.75rem; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<header>
<div class="logo">
<i class="fas fa-leaf"></i>
<span>CampusCare</span> – Admin Panel
</div>
<nav class="main-menu">
<a href="aindex.html"><i class="fas fa-gauge"></i> Dashboard</a>
<a href="amanageusers.html" class="active"><i class="fas fa-users"></i> Manage Users</a>
<a href="amanagelost.html"><i class="fas fa-box-open"></i> Lost Reports</a>
<a href="amanagefound.html"><i class="fas fa-hand-holding-heart"></i> Found Reports</a>
<a href="index.html"><i class="fas fa-right-from-bracket"></i> Logout</a>
</nav>
</header>

<main>
<section class="page-hero">
<h1><i class="fas fa-users"></i> Manage Users</h1>
<p>View, add, edit, or remove registered users</p>
</section>

<!-- Stats Overview -->
<div class="stats-row" id="statsRow">
  <div class="stat-card">
    <div class="stat-number" id="totalUsers">0</div>
    <div class="stat-label">Total Users</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" id="adminCount">0</div>
    <div class="stat-label">Admins</div>
  </div>
  <div class="stat-card">
    <div class="stat-number" id="studentCount">0</div>
    <div class="stat-label">Students / Users</div>
  </div>
</div>

<!-- Search & Add Bar -->
<div class="action-bar">
  <div class="search-input">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="Search by name, email...">
  </div>
  <button id="addUserBtn" class="add-user-btn"><i class="fas fa-user-plus"></i> Add User</button>
</div>

<!-- Users Table -->
<div class="table-container">
  <table class="users-table" id="usersTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Full Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Joined</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="6" class="no-data">Loading users...</td></tr>
    </tbody>
  </table>
</div>
</main>

<footer>
<p>© 2026 CampusCare Admin Panel — User Management</p>
</footer>

<!-- Modal for Add/Edit User -->
<div id="userModal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle"><i class="fas fa-user-edit"></i> Add User</h3>
    <input type="text" id="userName" placeholder="Full Name">
    <input type="email" id="userEmail" placeholder="Email Address">
    <select id="userRole">
      <option value="user">Student / User</option>
      <option value="admin">Admin</option>
    </select>
    <div class="modal-buttons">
      <button id="saveUserBtn" class="save-btn">Save</button>
      <button id="cancelModalBtn" class="cancel-btn">Cancel</button>
    </div>
  </div>
</div>

<script>
  // Simulated user database
  let users = [
    { id: 1, name: "Alex Johnson", email: "alex.johnson@campus.edu", role: "admin", joined: "2026-01-15" },
    { id: 2, name: "Priya Sharma", email: "priya.sharma@campus.edu", role: "user", joined: "2026-02-20" },
    { id: 3, name: "Rahul Mehta", email: "rahul.mehta@campus.edu", role: "user", joined: "2026-03-10" },
    { id: 4, name: "Emily Chen", email: "emily.chen@campus.edu", role: "user", joined: "2026-03-25" },
    { id: 5, name: "Mike Ross", email: "mike.ross@campus.edu", role: "admin", joined: "2026-01-05" },
    { id: 6, name: "Lisa Wong", email: "lisa.wong@campus.edu", role: "user", joined: "2026-04-01" },
    { id: 7, name: "David Kim", email: "david.kim@campus.edu", role: "user", joined: "2026-04-10" },
    { id: 8, name: "Sarah Johnson", email: "sarah.johnson@campus.edu", role: "user", joined: "2026-04-12" }
  ];

  let nextId = 9;
  let editingUserId = null;

  // DOM elements
  const tbody = document.getElementById('tableBody');
  const searchInput = document.getElementById('searchInput');
  const totalUsersSpan = document.getElementById('totalUsers');
  const adminCountSpan = document.getElementById('adminCount');
  const studentCountSpan = document.getElementById('studentCount');
  const addUserBtn = document.getElementById('addUserBtn');
  const modal = document.getElementById('userModal');
  const modalTitle = document.getElementById('modalTitle');
  const userNameInput = document.getElementById('userName');
  const userEmailInput = document.getElementById('userEmail');
  const userRoleSelect = document.getElementById('userRole');
  const saveUserBtn = document.getElementById('saveUserBtn');
  const cancelModalBtn = document.getElementById('cancelModalBtn');

  // Helper: update stats
  function updateStats() {
    const total = users.length;
    const admins = users.filter(u => u.role === 'admin').length;
    const students = users.filter(u => u.role === 'user').length;
    totalUsersSpan.innerText = total;
    adminCountSpan.innerText = admins;
    studentCountSpan.innerText = students;
  }

  // Toast notification
  function showToast(message, isError = false) {
    let toast = document.getElementById('dynamicToast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'dynamicToast';
      toast.style.position = 'fixed';
      toast.style.bottom = '20px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%) scale(0.9)';
      toast.style.background = '#1e2a3a';
      toast.style.backdropFilter = 'blur(20px)';
      toast.style.padding = '0.8rem 1.6rem';
      toast.style.borderRadius = '60px';
      toast.style.color = '#fff';
      toast.style.fontWeight = '500';
      toast.style.zIndex = '2000';
      toast.style.boxShadow = '0 10px 25px rgba(0,0,0,0.4)';
      toast.style.borderLeft = `4px solid ${isError ? '#ff6b6b' : 'var(--amber)'}`;
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.2s, transform 0.2s';
      toast.style.pointerEvents = 'none';
      document.body.appendChild(toast);
    }
    toast.textContent = message;
    toast.style.borderLeftColor = isError ? '#ff6b6b' : 'var(--amber)';
    toast.style.opacity = '1';
    toast.style.transform = 'translateX(-50%) scale(1)';
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(-50%) scale(0.9)';
    }, 2800);
  }

  // Render table
  function renderTable() {
    const searchTerm = searchInput.value.toLowerCase().trim();
    let filtered = [...users];
    if (searchTerm) {
      filtered = filtered.filter(u => 
        u.name.toLowerCase().includes(searchTerm) ||
        u.email.toLowerCase().includes(searchTerm)
      );
    }

    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="no-data">No users found.</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map(user => `
      <tr>
        <td>#${user.id}</td>
        <td><i class="fas fa-user-circle" style="color: var(--amber); margin-right: 8px;"></i>${escapeHtml(user.name)}</td>
        <td>${escapeHtml(user.email)}</td>
        <td><span class="role-badge ${user.role === 'admin' ? 'role-admin' : 'role-user'}">${user.role === 'admin' ? 'Admin' : 'User'}</span></td>
        <td>${user.joined}</td>
        <td class="action-buttons">
          <button class="action-btn edit" data-id="${user.id}" title="Edit User"><i class="fas fa-edit"></i></button>
          <button class="action-btn delete" data-id="${user.id}" title="Delete User"><i class="fas fa-trash"></i></button>
        </td>
      </tr>
    `).join('');

    // Attach event listeners
    document.querySelectorAll('.action-btn.edit').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.dataset.id);
        openEditModal(id);
      });
    });
    document.querySelectorAll('.action-btn.delete').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.dataset.id);
        deleteUser(id);
      });
    });
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Add / Edit logic
  function openAddModal() {
    editingUserId = null;
    modalTitle.innerHTML = '<i class="fas fa-user-plus"></i> Add User';
    userNameInput.value = '';
    userEmailInput.value = '';
    userRoleSelect.value = 'user';
    modal.style.display = 'flex';
  }

  function openEditModal(id) {
    const user = users.find(u => u.id === id);
    if (!user) return;
    editingUserId = id;
    modalTitle.innerHTML = '<i class="fas fa-user-edit"></i> Edit User';
    userNameInput.value = user.name;
    userEmailInput.value = user.email;
    userRoleSelect.value = user.role;
    modal.style.display = 'flex';
  }

  function saveUser() {
    const name = userNameInput.value.trim();
    const email = userEmailInput.value.trim();
    const role = userRoleSelect.value;

    if (!name || !email) {
      showToast('❌ Please fill in all fields.', true);
      return;
    }
    if (!email.includes('@') || !email.includes('.')) {
      showToast('❌ Please enter a valid email address.', true);
      return;
    }

    if (editingUserId === null) {
      // Add new user
      const newUser = {
        id: nextId++,
        name: name,
        email: email,
        role: role,
        joined: new Date().toISOString().slice(0,10)
      };
      users.push(newUser);
      showToast(`✅ User "${name}" added successfully.`);
    } else {
      // Edit existing
      const index = users.findIndex(u => u.id === editingUserId);
      if (index !== -1) {
        users[index].name = name;
        users[index].email = email;
        users[index].role = role;
        showToast(`✅ User "${name}" updated.`);
      }
    }
    updateStats();
    renderTable();
    closeModal();
  }

  function deleteUser(id) {
    const user = users.find(u => u.id === id);
    if (!user) return;
    if (confirm(`Permanently delete user "${user.name}"? This action cannot be undone.`)) {
      users = users.filter(u => u.id !== id);
      updateStats();
      renderTable();
      showToast(`🗑️ User "${user.name}" removed.`);
    }
  }

  function closeModal() {
    modal.style.display = 'none';
    editingUserId = null;
  }

  // Event listeners
  addUserBtn.addEventListener('click', openAddModal);
  saveUserBtn.addEventListener('click', saveUser);
  cancelModalBtn.addEventListener('click', closeModal);
  window.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });
  searchInput.addEventListener('input', renderTable);

  // Initial render
  updateStats();
  renderTable();
</script>
<div id="usersList"></div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = 'login.html';

async function loadUsers() {
  const res = await fetch('/api/admin/users', {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  const data = await res.json();
  if (data.success) {
    document.getElementById('usersList').innerHTML = data.users.map(u => `
      <div>${u.name} (${u.email}) - ${u.role}
        <button onclick="deleteUser(${u.id})">Delete</button>
      </div>
    `).join('');
  }
}

async function deleteUser(id) {
  if (confirm('Delete user?')) {
    await fetch(`/api/admin/users/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    loadUsers();
  }
}
loadUsers();
</script>
</body>
</html>
